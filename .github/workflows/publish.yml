name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]*'   # v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  # ── Verify tests pass before packing ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Run tests
        run: |
          dotnet test tests/Circle.AI.Tests/Circle.AI.Tests.csproj \
            --configuration Release \
            --verbosity minimal

  # ── Pack all non-MAUI packages (net9.0, ubuntu) ──────────────────────────
  pack-standard:
    name: Pack standard packages
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Pack
        run: |
          for proj in \
            src/Circle.AI.Core \
            src/Circle.AI.Inference \
            src/Circle.AI.Embeddings \
            src/Circle.AI.Search \
            src/Circle.AI.Memory \
            src/Circle.AI.Skills \
            src/Circle.AI.Tools \
            src/Circle.AI.Voice \
            src/Circle.AI.Hosting \
            src/Circle.AI.Aether \
            src/Circle.AI.Security; do
            dotnet pack "$proj" \
              --configuration Release \
              -p:ContinuousIntegrationBuild=true \
              --output ./nupkgs
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-standard
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  # ── Pack Circle.AI.Maui (requires MAUI workloads on Windows + net10) ─────
  pack-maui:
    name: Pack Circle.AI.Maui
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Pack
        run: |
          dotnet pack src/Circle.AI.Maui `
            --configuration Release `
            -p:ContinuousIntegrationBuild=true `
            --output ./nupkgs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-maui
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  # ── Push all packages to NuGet.org ────────────────────────────────────────
  push:
    name: Push to NuGet
    runs-on: ubuntu-latest
    needs: [pack-standard, pack-maui]
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: nupkgs-*
          merge-multiple: true
          path: ./nupkgs

      - name: Push .nupkg files
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Push .snupkg files
        run: |
          shopt -s nullglob
          for pkg in ./nupkgs/*.snupkg; do
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
        continue-on-error: true   # symbol packages are best-effort
